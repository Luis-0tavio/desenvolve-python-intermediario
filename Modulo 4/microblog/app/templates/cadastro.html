{% extends "base.html" %}

{% block content %}
    <h1>Cadastro</h1>
    {% if erro %}
        <div style="background-color: #f8d7da; color: #721c24; padding: 15px; border-radius: 4px; margin-bottom: 20px; border: 1px solid #f5c6cb;">
            {{ erro }}
        </div>
    {% endif %}
    <form method="post">
        <div class="form-group">
            <label for="username">Usuário:</label>
            <input type="text" id="username" name="username" required autofocus minlength="3">
        </div>
        <div class="form-group">
            <label for="password">Senha:</label>
            <input type="password" id="password" name="password" required minlength="3">
        </div>
        <div class="form-group">
            <label for="foto">Foto de Perfil (URL):</label>
            <input type="text" id="foto" name="foto" placeholder="https://exemplo.com/foto.jpg">
        </div>
        <div class="form-group">
            <label for="bio">Bio:</label>
            <textarea id="bio" name="bio" placeholder="Descreva você em poucas palavras..."></textarea>
        </div>
        <div class="form-group checkbox-group">
            <input type="checkbox" id="remember" name="remember">
            <label for="remember" style="margin-bottom: 0; font-weight: normal;">Lembrar de mim</label>
        </div>
        <div class="form-group">
            <button type="submit">Cadastrar</button>
        </div>
    </form>
{% endblock %}
